<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Tailwind 4</title>
    <script>
      (() => {
        const stored = localStorage.getItem("theme");
        const prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
        const isDark = stored === "dark" || (stored === null && prefersDark);
        document.documentElement.classList.toggle("dark", isDark);
      })();
    </script>
    <link rel="stylesheet" href="assets/styles/styles.css" />
  </head>
  <body class="h-full bg-white dark:bg-gray-800">
    <div class="flex h-full flex-col overflow-auto">
      <div class="sticky top-0 bg-lime-600 py-3">
        <div class="container mx-auto">
          <div class="flex items-center justify-between">
            <div class="flex shrink-0 text-xs-plus text-white uppercase">logo</div>

            <nav aria-label="Primary">
              <ul class="flex gap-x-4">
                <li>
                  <a class="text-white transition-colors duration-200 ease-in hover:text-black" href="#">Home</a>
                </li>
                <li>
                  <a class="text-white transition-colors duration-200 ease-in hover:text-black" href="#">About</a>
                </li>
                <li>
                  <a class="text-white transition-colors duration-200 ease-in hover:text-black" href="#">Services</a>
                </li>
                <li>
                  <a class="text-white transition-colors duration-200 ease-in hover:text-black" href="#">Contact</a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>

      <div class="container mx-auto">
        <h1 class="mb-5 text-4xl text-black dark:text-white">Lorem ipsum dolor, sit amet.</h1>

        <button class="app-c-btn app-c-btn-primary switch-theme">Switch theme</button>
        <button class="app-c-btn app-c-btn-secondary" disabled>Button</button>

        <div class="flex flex-col gap-x-8 md:flex-row">
          <aside class="order-2 mt-5 w-1/4 shrink-0 bg-yellow-300 md:order-1">Sidebar</aside>
          <div class="order-1 mt-5 w-full bg-red-400 md:order-2">Content</div>
        </div>

        <div class="mt-5 grid gap-4 md:grid-cols-2 lg:grid-cols-3">
          <div class="rounded-md bg-blue-400 p-3">1</div>
          <div class="rounded-md bg-blue-400 p-3">2</div>
          <div class="rounded-md bg-blue-400 p-3">3</div>
          <div class="rounded-md bg-blue-400 p-3">4</div>
          <div class="rounded-md bg-blue-400 p-3">5</div>
          <div class="rounded-md bg-blue-400 p-3">6</div>
        </div>
      </div>

      <div class="mt-auto">
        <div class="bg-slate-500 py-3">
          <div class="container mx-auto">
            <div class="flex items-center justify-between">
              <div class="flex shrink-0 text-white uppercase">logo</div>

              <p class="text-white">&copy; 2026.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const themeSwitch = document.querySelector(".switch-theme");

      themeSwitch?.addEventListener("click", () => {
        const isDark = document.documentElement.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
      });
    </script>
  </body>
</html>
